[book]
title = "Index Exchange Developer Portal"
authors = ["Index Exchange"]
description = "Information for web publishers on Index Exchange's site crawler bot"
language = "en"
src = "src"

[output.html]
# Default everyone to light mode (even with OS dark preference); the theme
# picker still lets readers switch manually.
default-theme = "light"
preferred-dark-theme = "light"
smart-punctuation = true
no-section-label = false
additional-css = ["theme/custom.css"]

[output.html.search]
enable = true

[output.html.fold]
enable = false

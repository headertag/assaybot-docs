server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compress text assets
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively; mdBook fingerprints search index per build
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # The docs build into book/bot.html/index.html, so the bot's declared
    # info URL (www.indexexchange.dev/bot.html) resolves via standard
    # directory handling: /bot.html -> 301 /bot.html/ -> index.html.
    location / {
        try_files $uri $uri/ =404;
    }

    # mdBook generates a styled 404 page
    error_page 404 /404.html;
}
